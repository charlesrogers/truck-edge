name: Deploy
on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/charlesrogers/truck-edge:latest
            ghcr.io/charlesrogers/truck-edge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://95.216.205.160:8000/api/v1/deploy?uuid=j5hfcfwylqpd84q0d5440uik&force=true"
      - name: Publish to dev blog
        if: success()
        env:
          BLOG_SECRET: ${{ secrets.BLOG_SECRET }}
        run: |
          TITLE=$(git log -1 --format="%s")
          BODY=$(git log -1 --format="%b")
          DIFF=$(git diff --stat HEAD~1 HEAD 2>/dev/null | tail -20)
          SUMMARY=$(echo "$BODY" | head -3)
          [ -z "$SUMMARY" ] && SUMMARY="$TITLE"
          curl -sf -X POST "https://dev.imprevista.com/api/blog/publish" \
            -H "Authorization: Bearer $BLOG_SECRET" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg product "Truck Edge" \
              --arg title "$TITLE" \
              --arg summary "$SUMMARY" \
              --arg body "$(printf '%s\n\n## Files Changed\n\n```\n%s\n```' "$BODY" "$DIFF")" \
              --arg commit_sha "${{ github.sha }}" \
              --arg commit_url "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
              --arg status "deployed" \
              '{product:$product, title:$title, summary:$summary, body:$body, commit_sha:$commit_sha, commit_url:$commit_url, status:$status}')" \
          || echo "::warning::Failed to publish to dev blog"
